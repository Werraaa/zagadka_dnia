<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zagadka dnia!</title>
    <style>
        :root {
            --bg-page: #121212;
            --bg-panel: #1e1e1e;
            --accent: #bb86fc;
            --text-main: #e1e1e1;
            --tile-bg: #2c2c2c;
            --cell-size: 30px;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            user-select: none;
        }

        h1 { color: var(--accent); background: rgba(255,255,255,0.05); padding: 10px 30px; border-radius: 15px; }
        .hidden { display: none !important; }

        /* SEKCJA 1: POŁĄCZENIA */
        .grid-conn { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 500px; margin: 20px 0; }
        .tile { aspect-ratio: 1/1; background: var(--tile-bg); border: 2px solid #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 13px; font-weight: bold; text-align: center; padding: 5px; text-transform: uppercase; }
        .tile.selected { background: var(--accent); color: #000; }
        .tile.wrong { background: #cf6679; animation: shake 0.4s; }
        .group { padding: 15px; margin: 5px 0; border-radius: 10px; color: white; font-weight: bold; width: 100%; max-width: 500px; text-align: center; }

        /* SEKCJA 2: OBRAZEK LOGICZNY */
        .nonogram-layout { 
            display: inline-grid; 
            grid-template-columns: 100px auto; 
            background: white; 
            padding: 15px; 
            border-radius: 8px; 
            color: #000;
        }

        .hints-top { display: grid; grid-template-columns: repeat(20, var(--cell-size)); grid-column: 2; }
        .hints-left { display: grid; grid-template-rows: repeat(5, var(--cell-size)); grid-row: 2; }
        .grid-nonogram { 
            display: grid; 
            grid-template-columns: repeat(20, var(--cell-size)); 
            grid-template-rows: repeat(5, var(--cell-size)); 
            border: 2px solid #000; 
            grid-column: 2;
            grid-row: 2;
        }

        .cell { 
            width: var(--cell-size); 
            height: var(--cell-size); 
            border: 1px solid #ccc; 
            cursor: crosshair; 
            box-sizing: border-box; 
            position: relative;
            background: #fff;
        }

        .cell.marked-x::after {
            content: "×"; color: red; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); font-size: 20px; font-weight: bold;
        }

        .c-c { background-color: #000000 !important; } .c-r { background-color: #ff0000 !important; }
        .c-n { background-color: #0000ff !important; } .c-z { background-color: #008000 !important; }
        .c-b { background-color: #8d4925 !important; } .c-p { background-color: #ffa500 !important; }
        
        .hint-group { display: flex; background: #fff; font-size: 11px; font-weight: 900; box-sizing: border-box; }
        .h-t { flex-direction: column; justify-content: flex-end; align-items: center; border-left: 1px solid #eee; padding-bottom: 5px; }
        .h-l { flex-direction: row; justify-content: flex-end; align-items: center; border-top: 1px solid #eee; padding-right: 8px; gap: 4px; }

        /* SEKCJA 3: REBUS */
        #rebus-container { display: flex; flex-direction: column; align-items: center; margin-top: 20px; }
        #rebus-img { display: block; border: 2px solid var(--accent); margin-bottom: 15px; }
        input[type="text"] { padding: 12px; width: 280px; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; font-size: 16px; margin-bottom: 10px; }

        /* FINAŁ */
        #final-image-container { width: 90vw; max-width: 1000px; margin-top: 20px; text-align: center; }
        #goralki-jpg { width: 100%; border-radius: 15px; box-shadow: 0 0 30px var(--accent); }

        button { background: #4caf50; color: white; border: none; padding: 12px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; margin: 10px; }
        .btn-brush { width: 45px; height: 45px; border-radius: 8px; border: 2px solid transparent; }
        .btn-brush.active { border-color: var(--accent); box-shadow: 0 0 8px var(--accent); }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body onmousedown="isMouseDown = true" onmouseup="isMouseDown = false">

    <h1>Zagadka dnia!</h1>

    <div id="section-connections">
        <div id="solved-box"></div>
        <div class="grid-conn" id="conn-grid"></div>
        <button onclick="checkConn()">Sprawdź połączenie</button>
    </div>

    <button id="btn-next-task" class="hidden" onclick="showNonogram()" style="background: #bb86fc;">Zagadka 2</button>

    <div id="section-nonogram" class="hidden">
        <div id="brush-panel" style="margin-bottom: 15px; display: flex; gap: 5px; justify-content: center;">
            <button class="btn-brush active" id="btn-c" onclick="setBrush('c')" style="background:#000"></button>
            <button class="btn-brush" id="btn-r" onclick="setBrush('r')" style="background:#f00"></button>
            <button class="btn-brush" id="btn-n" onclick="setBrush('n')" style="background:#00f"></button>
            <button class="btn-brush" id="btn-z" onclick="setBrush('z')" style="background:#008000"></button>
            <button class="btn-brush" id="btn-b" onclick="setBrush('b')" style="background:#8d4925"></button>
            <button class="btn-brush" id="btn-p" onclick="setBrush('p')" style="background:#ffa500"></button>
            <button class="btn-brush" id="btn-x" onclick="setBrush('x')" style="background:#eee; color: red; font-size: 24px; font-weight: bold; padding: 0;">×</button>
            <button class="btn-brush" id="btn-0" onclick="setBrush('0')" style="background:#fff; border: 1px dashed #000; color: #000; font-size: 10px;">GUMKA</button>
        </div>
        <div class="nonogram-layout">
            <div style="background:#eee; grid-row: 1; grid-column: 1;"></div>
            <div id="t-hints" class="hints-top"></div>
            <div id="l-hints" class="hints-left"></div>
            <div id="n-grid" class="grid-nonogram"></div>
        </div>
        <br>
        <button onclick="checkNonogram()">Zatwierdź obrazek</button>

        <div id="rebus-section" class="hidden">
            <div id="rebus-container">
                <img src="rebus.png" id="rebus-img" alt="Rebus">
                <input type="text" id="rebus-input" placeholder="Wpisz hasło...">
                <button onclick="checkRebus()">Sprawdź Hasło</button>
            </div>
        </div>
    </div>

    <div id="final-section" class="hidden">
        <div id="final-image-container">
            <h2 style="color: var(--accent);">🎉 GRATULACJE!</h2>
            <img src="goralki.jpg" id="goralki-jpg" alt="Nagroda">
        </div>
    </div>

<script>
    let isMouseDown = false;
    let currentBrush = 'c';

    // --- POŁĄCZENIA ---
    const connCats = [
        { name: "Schodki", words: ["Schody","Kamień","Piwo","Rzut"], color: "#845ef7" },
        { name: "Debilard", words: ["Debil","Diament","Kij","Gra"], color: "#f59f00" },
        { name: "Trip do kela", words: ["Sushi","Zamek","Autobus","Gwiazdy"], color: "#2b8a3e" },
        { name: "Kamienie występujące w Polsce", words: ["Agat","Ametyst","Fluoryt","Gips"], color: "#c92a2a" }
    ];
    let connWords = [];
    connCats.forEach(c => c.words.forEach(w => connWords.push({w, cat: c.name, col: c.color})));
    let connSelected = [];
    let connSolved = 0;

    function initConn() {
        const g = document.getElementById("conn-grid");
        g.innerHTML = "";
        connWords.sort(() => Math.random() - 0.5).forEach(item => {
            const d = document.createElement("div");
            d.className = "tile"; d.innerText = item.w;
            d.onclick = () => {
                if(connSelected.includes(item)) { connSelected = connSelected.filter(i=>i!==item); d.classList.remove("selected"); }
                else if(connSelected.length < 4) { connSelected.push(item); d.classList.add("selected"); }
            };
            g.appendChild(d);
        });
    }

    function checkConn() {
        if(connSelected.length !== 4) return;
        const cat = connSelected[0].cat;
        if(connSelected.every(i => i.cat === cat)) {
            connSolved++;
            const group = document.createElement("div");
            group.className = "group"; group.style.background = connSelected[0].col;
            group.innerHTML = `<strong>${cat.toUpperCase()}</strong><br>${connSelected.map(i=>i.w).join(", ")}`;
            document.getElementById("solved-box").appendChild(group);
            const ws = connSelected.map(i=>i.w);
            connWords = connWords.filter(i => !ws.includes(i.w));
            connSelected = []; initConn();
            if(connSolved === 4) document.getElementById("btn-next-task").classList.remove("hidden");
        } else {
            document.querySelectorAll(".tile.selected").forEach(t => {
                t.classList.add("wrong");
                setTimeout(() => t.classList.remove("wrong", "selected"), 500);
            });
            connSelected = [];
        }
    }

    // --- NONOGRAM ---
    const nonoSol = [
        "000000000000n00000zz",
        "000c0000000000bb00zz",
        "00ccc000c00000bb0000",
        "0ccccc0ccc0000000r00",
        "ccccccccccc00p000000"
    ].map(row => row.split(''));

    function setBrush(b) { 
        currentBrush = b; 
        document.querySelectorAll('.btn-brush').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn-' + b).classList.add('active');
    }

    function paintCell(cell) {
        cell.className = "cell";
        if(currentBrush === 'x') cell.classList.add("marked-x");
        else if(currentBrush !== '0') cell.classList.add("c-" + currentBrush);
    }

    function initNonogram() {
        const g = document.getElementById("n-grid");
        const lh = document.getElementById("l-hints");
        const th = document.getElementById("t-hints");
        const colorMap = { c:'#000', r:'#f00', n:'#00f', z:'#008000', b:'#8d4925', p:'#ffa500', '0':'#ccc' };

        for(let r=0; r<5; r++) {
            const hints = getHints(nonoSol[r]);
            const d = document.createElement("div"); d.className="hint-group h-l";
            hints.forEach(h => {
                const s = document.createElement("span"); s.style.color = colorMap[h.t];
                s.innerText = h.c; d.appendChild(s);
            });
            lh.appendChild(d);

            for(let c=0; c<20; c++) {
                const cell = document.createElement("div"); cell.className="cell";
                cell.dataset.r = r; cell.dataset.c = c;
                cell.onmousedown = (e) => { e.preventDefault(); paintCell(cell); };
                cell.onmouseenter = () => { if(isMouseDown) paintCell(cell); };
                g.appendChild(cell);
            }
        }

        for(let c=0; c<20; c++) {
            const col = []; for(let r=0; r<5; r++) col.push(nonoSol[r][c]);
            const hints = getHints(col);
            const d = document.createElement("div"); d.className="hint-group h-t";
            hints.forEach(h => {
                const s = document.createElement("span"); s.style.color = colorMap[h.t];
                s.innerText = h.c; d.appendChild(s);
            });
            th.appendChild(d);
        }
    }

    function getHints(arr) {
        let h = [], c = 0, l = '0';
        arr.forEach(v => {
            if(v !== '0') {
                if(v === l) c++;
                else { if(c > 0) h.push({c, t: l}); c = 1; l = v; }
            } else { if(c > 0) h.push({c, t: l}); c = 0; l = '0'; }
        });
        if(c > 0) h.push({c, t: l});
        return h.length ? h : [{c:0, t:'0'}];
    }

    function checkNonogram() {
        const cells = document.querySelectorAll("#n-grid .cell");
        let ok = true;
        cells.forEach(cell => {
            const r = cell.dataset.r, c = cell.dataset.c;
            const sol = nonoSol[r][c];
            if(sol === '0') {
                if(cell.classList.contains("marked-x")) return;
                if(cell.classList.length > 1) ok = false;
            } else if(!cell.classList.contains("c-" + sol)) ok = false;
        });

        if(ok) {
            document.getElementById("rebus-section").classList.remove("hidden");
            // Ustawienie szerokości dokładnie takiej jak siatka (cell-size * 20 kolumn)
            const gridWidth = 20 * 30; 
            document.getElementById("rebus-img").style.width = gridWidth + "px";
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        } else alert("Obrazek zawiera błędy!");
    }

    function showNonogram() {
        document.getElementById("section-connections").classList.add("hidden");
        document.getElementById("btn-next-task").classList.add("hidden");
        document.getElementById("section-nonogram").classList.remove("hidden");
        initNonogram();
    }

    // --- REBUS I FINAŁ ---
    function checkRebus() {
        const val = document.getElementById("rebus-input").value.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        if(val === "goralki") {
            // Ukrywamy wszystko poza nagłówkiem i pokazujemy finał
            document.getElementById("section-nonogram").classList.add("hidden");
            document.getElementById("final-section").classList.remove("hidden");
            window.scrollTo(0,0);
        } else alert("Niepoprawne hasło!");
    }

    initConn();
</script>
</body>
</html>
