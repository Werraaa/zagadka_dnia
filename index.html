<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zagadka Dnia</title>
    <style>
        :root {
            --bg-page: #121212;
            --bg-panel: #1e1e1e;
            --accent: #bb86fc;
            --text-main: #e1e1e1;
            --tile-bg: #2c2c2c;
            --cell-size: 30px;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            user-select: none;
        }

        h1 { color: var(--accent); background: rgba(255,255,255,0.05); padding: 10px 30px; border-radius: 15px; cursor: pointer; }
        .hidden { display: none !important; }

        /* MODUŁ: POŁĄCZENIA */
        .grid-conn { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 500px; margin: 20px 0; }
        .tile { aspect-ratio: 1/1; background: var(--tile-bg); border: 2px solid #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 13px; font-weight: bold; text-align: center; padding: 5px; text-transform: uppercase; }
        .tile.selected { background: var(--accent); color: #000; }
        .tile.wrong { background: #cf6679; animation: shake 0.4s; }
        .group { padding: 15px; margin: 5px 0; border-radius: 10px; color: white; font-weight: bold; width: 100%; max-width: 500px; text-align: center; }

        /* MODUŁ: OBRAZEK LOGICZNY */
        .nonogram-layout { display: inline-grid; grid-template-columns: auto auto; background: white; padding: 15px; border-radius: 8px; color: #000; }
        .grid-nonogram { display: grid; border: 2px solid #000; grid-column: 2; grid-row: 2; }
        .cell { width: var(--cell-size); height: var(--cell-size); border: 1px solid #ccc; cursor: crosshair; box-sizing: border-box; position: relative; background: #fff; }
        .cell.marked-x::after { content: "×"; color: red; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; font-weight: bold; }
        
        .hint-group { display: flex; background: #fff; font-size: 11px; font-weight: 900; }
        .h-t { flex-direction: column; justify-content: flex-end; align-items: center; border-left: 1px solid #eee; padding-bottom: 5px; }
        .h-l { flex-direction: row; justify-content: flex-end; align-items: center; border-top: 1px solid #eee; padding-right: 8px; gap: 4px; }

        /* FINALE */
        #final-section { text-align: center; margin-top: 20px; }
        #reward-img { max-width: 90vw; border-radius: 15px; box-shadow: 0 0 30px var(--accent); margin-top: 20px; }

        button { background: #4caf50; color: white; border: none; padding: 12px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; margin: 10px; }
        .btn-brush { width: 45px; height: 45px; border-radius: 8px; border: 2px solid #444; cursor: pointer; transition: 0.2s; }
        .btn-brush.active { border-color: var(--accent); transform: scale(1.1); box-shadow: 0 0 10px var(--accent); }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body onmousedown="isMouseDown = true" onmouseup="isMouseDown = false">

    <h1 onclick="location.reload()">Zagadka Dnia</h1>
    <div id="status-label" style="font-style: italic; color: #888; margin-bottom: 15px;">Inicjalizacja...</div>

    <div id="puzzle-container"></div>

    <div id="final-section" class="hidden">
        <h2 style="color: var(--accent); font-size: 2.5rem;">🎉 GRATULACJE!</h2>
        <div id="reward-container"></div>
    </div>

<script>
    let isMouseDown = false;
    let currentBrush = 'c';
    
    const FULL_COLOR_MAP = {
        'c': '#000000', 'r': '#FF0000', 'n': '#0000FF', 'z': '#008000', 
        'b': '#8D4925', 'p': '#FFA500', 'y': '#FFFF00', 'm': '#FF00FF',
        't': '#40E0D0', 'v': '#EE82EE', 'g': '#808080', 'o': '#808000',
        's': '#87CEEB', 'l': '#00FF00', 'i': '#4B0082', 'k': '#FF7F50',
        'a': '#7FFFD4', 'w': '#800000', 'e': '#F5F5DC', 'f': '#FF00FF'
    };

    async function init() {
        const now = new Date();
        const dd = String(now.getDate()).padStart(2, '0');
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const baseName = `z${dd}_${mm}`;

        try {
            const response = await fetch(`zagadki/${baseName}.json`);
            if (response.ok) {
                const data = await response.json();
                renderPuzzle(data);
            } else {
                loadExternalJS(baseName);
            }
        } catch (e) {
            document.getElementById('status-label').innerText = "Błąd połączenia z serwerem.";
        }
    }

    function renderPuzzle(data) {
        document.getElementById('status-label').innerText = data.title || "";
        const container = document.getElementById('puzzle-container');
        container.innerHTML = "";

        if (data.type === "connections") {
            initConnectionsEngine(data);
        } else if (data.type === "nonogram") {
            initNonogramEngine(data);
        }
    }

    // --- SILNIK: POŁĄCZENIA ---
    function initConnectionsEngine(data) {
        let selected = [];
        let solvedCount = 0;
        let pool = [];
        data.categories.forEach(cat => cat.words.forEach(w => pool.push({w, cat: cat.name, col: cat.color})));
        pool.sort(() => Math.random() - 0.5);

        const wrapper = document.createElement("div");
        wrapper.innerHTML = `<div id="conn-solved"></div><div class="grid-conn" id="conn-grid"></div><button id="btn-check-conn">Sprawdź połączenie</button>`;
        document.getElementById('puzzle-container').appendChild(wrapper);

        const renderGrid = () => {
            const grid = document.getElementById("conn-grid");
            grid.innerHTML = "";
            pool.forEach(item => {
                const d = document.createElement("div"); d.className = "tile"; d.innerText = item.w;
                d.onclick = () => {
                    if(selected.includes(item)) { selected = selected.filter(i => i !== item); d.classList.remove("selected"); }
                    else if(selected.length < 4) { selected.push(item); d.classList.add("selected"); }
                };
                grid.appendChild(d);
            });
        };

        document.getElementById("btn-check-conn").onclick = () => {
            if(selected.length !== 4) return;
            const targetCat = selected[0].cat;
            if(selected.every(i => i.cat === targetCat)) {
                solvedCount++;
                const group = document.createElement("div");
                group.className = "group"; group.style.background = selected[0].col;
                group.innerHTML = `<strong>${targetCat.toUpperCase()}</strong><br>${selected.map(i=>i.w).join(", ")}`;
                document.getElementById("conn-solved").appendChild(group);
                const ws = selected.map(i=>i.w);
                pool = pool.filter(i => !ws.includes(i.w));
                selected = []; renderGrid();
                if(solvedCount === 4) finishPuzzle();
            } else {
                document.querySelectorAll(".tile.selected").forEach(t => { t.classList.add("wrong"); setTimeout(() => t.classList.remove("wrong", "selected"), 500); });
                selected = [];
            }
        };
        renderGrid();
    }

    // --- SILNIK: OBRAZEK LOGICZNY ---
    function initNonogramEngine(data) {
        const sol = data.solution;
        const rows = sol.length;
        const cols = sol[0].length;

        // Znajdź tylko kolory użyte w tej zagadce
        const usedColors = [...new Set(sol.flat())].filter(c => c !== '0');
        currentBrush = usedColors[0] || 'c';

        // Wstrzyknij style CSS dla użytych kolorów
        usedColors.forEach(c => {
            if (!document.getElementById(`style-c-${c}`)) {
                const s = document.createElement('style');
                s.id = `style-c-${c}`;
                s.innerHTML = `.c-${c} { background-color: ${FULL_COLOR_MAP[c]} !important; }`;
                document.head.appendChild(s);
            }
        });

        const wrapper = document.createElement("div");
        wrapper.innerHTML = `
            <div id="brush-panel" style="margin-bottom:15px; display:flex; gap:8px; justify-content:center; flex-wrap:wrap;"></div>
            <div class="nonogram-layout">
                <div style="background:#eee; grid-row:1; grid-column:1;"></div>
                <div id="t-hints" class="hints-top" style="display:grid; grid-template-columns:repeat(${cols}, var(--cell-size))"></div>
                <div id="l-hints" class="hints-left" style="display:grid; grid-template-rows:repeat(${rows}, var(--cell-size))"></div>
                <div id="n-grid" class="grid-nonogram" style="grid-template-columns:repeat(${cols}, var(--cell-size)); grid-template-rows:repeat(${rows}, var(--cell-size))"></div>
            </div>
            <br><button id="btn-check-nono">Zatwierdź obrazek</button>
        `;
        document.getElementById('puzzle-container').appendChild(wrapper);

        // Buduj paletę tylko z użytych kolorów + X + Gumka
        const pBox = document.getElementById("brush-panel");
        [...usedColors, 'x', '0'].forEach(p => {
            const b = document.createElement("button");
            b.className = "btn-brush";
            if(p === 'x') { b.innerText = "×"; b.style.color = "red"; b.style.fontSize = "24px"; b.style.background = "#eee"; }
            else if(p === '0') { b.innerText = "G"; b.style.background = "#fff"; b.style.fontSize = "10px"; }
            else { b.style.background = FULL_COLOR_MAP[p]; }
            
            if(p === currentBrush) b.classList.add("active");
            b.onclick = () => {
                currentBrush = p;
                document.querySelectorAll(".btn-brush").forEach(btn => btn.classList.remove("active"));
                b.classList.add("active");
            };
            pBox.appendChild(b);
        });

        const getHints = (arr) => {
            let h = [], c = 0, l = '0';
            arr.forEach(v => {
                if(v !== '0') {
                    if(v === l) c++;
                    else { if(c > 0) h.push({c, t: l}); c = 1; l = v; }
                } else { if(c > 0) h.push({c, t: l}); c = 0; l = '0'; }
            });
            if(c > 0) h.push({c, t: l});
            return h.length ? h : [{c:0, t:'0'}];
        };

        const g = document.getElementById("n-grid");
        const lh = document.getElementById("l-hints");
        const th = document.getElementById("t-hints");

        for(let r=0; r<rows; r++) {
            const hL = getHints(sol[r]);
            const d = document.createElement("div"); d.className="hint-group h-l";
            hL.forEach(h => { const s=document.createElement("span"); s.style.color=(h.t==='0'?'#ccc':FULL_COLOR_MAP[h.t]); s.innerText=h.c; d.appendChild(s); });
            lh.appendChild(d);
            for(let c=0; c<cols; c++) {
                const cell = document.createElement("div"); cell.className="cell";
                cell.dataset.r = r; cell.dataset.c = c;
                cell.onmousedown = (e) => { e.preventDefault(); paint(cell); };
                cell.onmouseenter = () => { if(isMouseDown) paint(cell); };
                g.appendChild(cell);
            }
        }

        for(let c=0; c<cols; c++) {
            const colData = []; for(let r=0; r<rows; r++) colData.push(sol[r][c]);
            const hT = getHints(colData);
            const d = document.createElement("div"); d.className="hint-group h-t";
            hT.forEach(h => { const s=document.createElement("span"); s.style.color=(h.t==='0'?'#ccc':FULL_COLOR_MAP[h.t]); s.innerText=h.c; d.appendChild(s); });
            th.appendChild(d);
        }

        function paint(cell) {
            cell.className = "cell";
            if(currentBrush === 'x') cell.classList.add("marked-x");
            else if(currentBrush !== '0') cell.classList.add("c-" + currentBrush);
        }

        document.getElementById("btn-check-nono").onclick = () => {
            const cells = document.querySelectorAll("#n-grid .cell");
            let ok = true;
            cells.forEach(cell => {
                const r = cell.dataset.r, c = cell.dataset.c;
                const s = sol[r][c];
                if(s === '0') {
                    if(!cell.classList.contains("marked-x") && cell.classList.length > 1) ok = false;
                } else if(!cell.classList.contains("c-" + s)) ok = false;
            });
            if(ok) finishPuzzle(); else alert("Obrazek nie jest jeszcze poprawny!");
        };
    }

    async function finishPuzzle() {
        document.getElementById("puzzle-container").classList.add("hidden");
        document.getElementById("status-label").classList.add("hidden");
        document.getElementById("final-section").classList.remove("hidden");

        const now = new Date();
        const dd = String(now.getDate()).padStart(2, '0');
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const imgBase = `${dd}_${mm}`;
        
        const rewardBox = document.getElementById("reward-container");
        const tryLoad = (ext) => new Promise((res) => {
            const img = new Image();
            img.onload = () => res(img);
            img.onerror = () => res(null);
            img.src = `${imgBase}.${ext}`;
        });

        let foundImg = await tryLoad('jpg') || await tryLoad('png');
        if(foundImg) { foundImg.id = "reward-img"; rewardBox.appendChild(foundImg); }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function loadExternalJS(name) {
        const s = document.createElement('script');
        s.src = `zagadki/${name}.js`;
        s.onerror = () => document.getElementById('status-label').innerText = "Brak zagadki na ten dzień.";
        document.body.appendChild(s);
    }

    init();
</script>
</body>
</html>
