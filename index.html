<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zagadka Dnia - Silnik JS</title>
    <style>
        /* Zachowuję Twoje style, dodaję drobne poprawki dla kontenera gry */
        :root {
            --bg-page: #121212;
            --bg-panel: #1e1e1e;
            --accent: #bb86fc;
            --accent-soft: #f48fb1;
            --text-main: #e1e1e1;
            --tile-bg: #2c2c2c;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header, #archive-header {
            width: 100%;
            padding: 20px;
            background: var(--bg-panel);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            border-bottom: 2px solid var(--accent);
        }

        #archive-header { display: none; background: #252525; border-bottom: 1px solid #444; }

        .btn-main {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        #main-container { width: 100%; max-width: 900px; padding: 20px; }

        #archive-section {
            display: none;
            background: var(--bg-panel);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
        }

        .day { padding: 10px; background: #333; border-radius: 5px; cursor: pointer; }
        .day.has-puzzle { background: var(--accent-soft); color: #000; font-weight: bold; }
        .day.empty { background: transparent; cursor: default; }

        #game-canvas {
            width: 100%;
            min-height: 400px;
            background: var(--tile-bg);
            border-radius: 10px;
            padding: 20px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div id="archive-header">
        <button class="btn-main" onclick="toggleArchive()">Otwórz Kalendarz</button>
        <span id="mini-status"></span>
    </div>

    <header id="top-header">
        <h1>Zagadka Dnia</h1>
        <button class="btn-main" onclick="toggleArchive()">Archiwum</button>
    </header>

    <div id="main-container">
        <div id="archive-section">
            <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px;">
                <button class="btn-main" onclick="changeMonth(-1)">&lt;</button>
                <h2 id="current-month-year"></h2>
                <button class="btn-main" onclick="changeMonth(1)">&gt;</button>
            </div>
            <div class="calendar-grid" id="calendar-days"></div>
        </div>

        <div id="game-area">
            <div id="status-label" style="margin-bottom:10px; color:#aaa;">Inicjalizacja...</div>
            <div id="game-canvas">
                <p>Czekam na załadowanie skryptu...</p>
            </div>
        </div>
    </div>

    <script>
        let currentViewDate = new Date();
        let isArchiveOpen = false;

        function getFileNameForDate(date) {
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            return `z${day}_${month}.js`;
        }

        // --- KLUCZOWA ZMIANA: ŁADOWANIE PLIKU JS ---
        function loadPuzzleScript(date) {
            const fileName = getFileNameForDate(date);
            const statusLabel = document.getElementById('status-label');
            const canvas = document.getElementById('game-canvas');
            
            statusLabel.innerText = `Ładowanie skryptu: ${fileName}...`;
            canvas.innerHTML = ''; // Czyszczenie kontenera

            // Usuwamy poprzedni skrypt zagadki, jeśli istniał
            const oldScript = document.getElementById('active-puzzle-script');
            if (oldScript) oldScript.remove();

            const script = document.createElement('script');
            script.id = 'active-puzzle-script';
            script.src = `zagadki/${fileName}`;
            
            script.onload = () => {
                statusLabel.innerText = `Uruchomiono: ${fileName}`;
                // Zakładamy, że każdy plik zagadki ma funkcję initPuzzle(container)
                if (typeof initPuzzle === 'function') {
                    initPuzzle(canvas);
                } else {
                    canvas.innerHTML = `<p style="color:red;">Błąd: Plik ${fileName} nie posiada funkcji initPuzzle!</p>`;
                }
            };

            script.onerror = () => {
                statusLabel.innerText = `Błąd`;
                canvas.innerHTML = `<p>Nie znaleziono zagadki dla tej daty (${fileName}).</p>`;
            };

            document.body.appendChild(script);
        }

        // Logika kalendarza (uproszczona)
        function toggleArchive() {
            isArchiveOpen = !isArchiveOpen;
            document.getElementById('archive-section').style.display = isArchiveOpen ? 'block' : 'none';
            if (isArchiveOpen) renderCalendar();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-days');
            const monthYearLabel = document.getElementById('current-month-year');
            grid.innerHTML = '';

            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            const monthNames = ["Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec", "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"];
            monthYearLabel.innerText = `${monthNames[month]} ${year}`;

            // (Tutaj wstaw logikę generowania dni, którą miałeś wcześniej...)
            // Skrócony przykład:
            for (let d = 1; d <= 31; d++) { 
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day has-puzzle';
                dayDiv.innerText = d;
                dayDiv.onclick = () => {
                    const selectedDate = new Date(year, month, d);
                    loadPuzzleScript(selectedDate);
                    document.getElementById('top-header').style.display = 'none';
                    document.getElementById('archive-header').style.display = 'flex';
                    document.getElementById('mini-status').innerText = getFileNameForDate(selectedDate);
                };
                grid.appendChild(dayDiv);
            }
        }

        function changeMonth(delta) {
            currentViewDate.setMonth(currentViewDate.getMonth() + delta);
            renderCalendar();
        }

        window.onload = () => loadPuzzleScript(new Date());
    </script>
</body>
</html>
