<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zagadka dnia!</title>
    <style>
        :root {
            --bg-page: #121212;
            --accent: #bb86fc;
            --text-main: #e1e1e1;
            --cell-size: 25px;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            user-select: none;
        }

        h1 { color: var(--accent); background: rgba(255,255,255,0.05); padding: 10px 30px; border-radius: 15px; }
        .hidden { display: none !important; }

        /* NONOGRAM */
        .nonogram-layout { 
            display: inline-grid; 
            grid-template-columns: 120px auto; 
            background: white; 
            padding: 15px; 
            border-radius: 8px; 
            color: #000;
        }

        .hints-top { display: grid; grid-template-columns: repeat(24, var(--cell-size)); grid-column: 2; }
        .hints-left { display: grid; grid-template-rows: repeat(10, var(--cell-size)); grid-row: 2; }
        .grid-nonogram { 
            display: grid; 
            grid-template-columns: repeat(24, var(--cell-size)); 
            grid-template-rows: repeat(10, var(--cell-size)); 
            border: 2px solid #000; 
            grid-column: 2;
            grid-row: 2;
            position: relative;
            background: #fff;
        }

        .cell { 
            width: var(--cell-size); 
            height: var(--cell-size); 
            border: 1px solid #ccc; 
            box-sizing: border-box; 
            background: #fff;
            position: relative;
        }

        .cell.marked-x::after {
            content: "×"; color: red; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); font-size: 18px; font-weight: bold;
        }

        .c-c { background-color: #000000 !important; } 
        .c-r { background-color: #ff0000 !important; }
        .c-b { background-color: #8d4925 !important; } 
        
        .hint-group { display: flex; background: #fff; font-size: 10px; font-weight: 900; box-sizing: border-box; }
        .h-t { flex-direction: column; justify-content: flex-end; align-items: center; border-left: 1px solid #eee; padding-bottom: 5px; }
        .h-l { flex-direction: row; justify-content: flex-end; align-items: center; border-top: 1px solid #eee; padding-right: 8px; gap: 3px; }

        /* Nakładka ptaka - 3 wiersze, 5 kolumn (aby zmieścić rcrc) */
        #bird-overlay {
            position: absolute;
            display: grid;
            grid-template-columns: repeat(5, var(--cell-size));
            grid-template-rows: repeat(3, var(--cell-size));
            pointer-events: none;
            z-index: 100;
        }

        #goralki-jpg { width: 100%; max-width: 800px; border-radius: 15px; box-shadow: 0 0 30px var(--accent); margin-top: 20px; }

        button { background: #4caf50; color: white; border: none; padding: 12px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; margin: 10px; }
        .btn-brush { width: 40px; height: 40px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-brush.active { border-color: var(--accent); box-shadow: 0 0 8px var(--accent); }
    </style>
</head>
<body onmousedown="isMouseDown = true" onmouseup="isMouseDown = false">

    <h1>Zagadka dnia!</h1>

    <div id="section-nonogram">
        <div id="brush-panel" style="margin-bottom: 15px; display: flex; gap: 5px; justify-content: center;">
            <button class="btn-brush active" id="btn-b" onclick="setBrush('b')" style="background:#8d4925"></button>
            <button class="btn-brush" id="btn-r" onclick="setBrush('r')" style="background:#f00"></button>
            <button class="btn-brush" id="btn-c" onclick="setBrush('c')" style="background:#000"></button>
            <button class="btn-brush" id="btn-x" onclick="setBrush('x')" style="background:#eee; color: red; font-size: 24px; font-weight: bold;">×</button>
            <button class="btn-brush" id="btn-0" onclick="setBrush('0')" style="background:#fff; border: 1px dashed #000; color: #000; font-size: 10px;">GUMKA</button>
        </div>
        
        <div class="nonogram-layout">
            <div style="background:#eee; grid-row: 1; grid-column: 1;"></div>
            <div id="t-hints" class="hints-top"></div>
            <div id="l-hints" class="hints-left"></div>
            <div id="n-grid" class="grid-nonogram">
                <div id="bird-overlay" class="hidden"></div>
            </div>
        </div>
        <br>
        <div style="text-align: center;">
            <button id="btn-submit-nono" onclick="checkNonogram()">Zatwierdź obrazek</button>
        </div>
    </div>

    <div id="final-section" class="hidden">
        <h2 style="color: var(--accent); text-align: center;">🎉 GRATULACJE!</h2>
        <div style="text-align: center;">
            <img src="goralki.jpg" id="goralki-jpg" alt="Nagroda">
        </div>
    </div>

<script>
    let isMouseDown = false;
    let currentBrush = 'b';

    const nonoSol = [
        "b00000000000b000000000000",
        "0b000rrr000b000b000b000b0",
        "00b00rcrc0b000bbb0bbb0bbb",
        "000b0rrr0b0000bbb0bbb0bbb",
        "0000b000b00000bbb0bbb0bbb",
        "00000b0b000000bbb0bbb0bbb",
        "000000b0000000bbb0bbb0bbb",
        "000000b0000000bbb0bbb0bbb",
        "000000b0000000bbb0bbb0bbb",
        "000000b0000000bbb0bbb0bbb"
    ].map(row => row.split(''));

    function setBrush(b) { 
        currentBrush = b; 
        document.querySelectorAll('.btn-brush').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn-' + b).classList.add('active');
    }

    function paintCell(cell) {
        cell.className = "cell";
        if(currentBrush === 'x') cell.classList.add("marked-x");
        else if(currentBrush !== '0') cell.classList.add("c-" + currentBrush);
    }

    function initNonogram() {
        const g = document.getElementById("n-grid");
        const lh = document.getElementById("l-hints");
        const th = document.getElementById("t-hints");
        const colorMap = { b:'#8d4925', r:'#f00', c:'#000', '0':'#ccc' };

        for(let r=0; r<10; r++) {
            const hints = getHints(nonoSol[r]);
            const d = document.createElement("div"); d.className="hint-group h-l";
            hints.forEach(h => {
                const s = document.createElement("span"); s.style.color = colorMap[h.t];
                s.innerText = h.c; d.appendChild(s);
            });
            lh.appendChild(d);

            for(let c=0; c<24; c++) {
                const cell = document.createElement("div"); cell.className="cell";
                cell.dataset.r = r; cell.dataset.c = c;
                cell.onmousedown = (e) => { e.preventDefault(); paintCell(cell); };
                cell.onmouseenter = () => { if(isMouseDown) paintCell(cell); };
                g.appendChild(cell);
            }
        }

        for(let c=0; c<24; c++) {
            const col = []; for(let r=0; r<10; r++) col.push(nonoSol[r][c]);
            const hints = getHints(col);
            const d = document.createElement("div"); d.className="hint-group h-t";
            hints.forEach(h => {
                const s = document.createElement("span"); s.style.color = colorMap[h.t];
                s.innerText = h.c; d.appendChild(s);
            });
            th.appendChild(d);
        }
    }

    function getHints(arr) {
        let h = [], c = 0, l = '0';
        arr.forEach(v => {
            if(v !== '0') {
                if(v === l) c++;
                else { if(c > 0) h.push({c, t: l}); c = 1; l = v; }
            } else { if(c > 0) h.push({c, t: l}); c = 0; l = '0'; }
        });
        if(c > 0) h.push({c, t: l});
        return h.length ? h : [{c:0, t:'0'}];
    }

    async function checkNonogram() {
        const cells = document.querySelectorAll("#n-grid .cell");
        let ok = true;
        cells.forEach(cell => {
            const r = parseInt(cell.dataset.r), c = parseInt(cell.dataset.c);
            const sol = nonoSol[r][c];
            if(sol === '0') {
                if(cell.classList.contains("marked-x")) return;
                if(cell.classList.length > 1) ok = false;
            } else if(!cell.classList.contains("c-" + sol)) ok = false;
        });

        if(ok) {
            document.getElementById("btn-submit-nono").disabled = true;
            await runBirdAnimation();
            document.getElementById("section-nonogram").classList.add("hidden");
            document.getElementById("final-section").classList.remove("hidden");
        } else alert("Obrazek zawiera błędy!");
    }

    async function runBirdAnimation() {
        const overlay = document.getElementById("bird-overlay");
        overlay.innerHTML = "";
        overlay.classList.remove("hidden");
        
        // Definicja ptaka (3 wiersze x 5 kolumn dla r=1,2,3 c=4,5,6,7,8)
        // Wiersz 1: rrr00 (c=4,5,6)
        // Wiersz 2: rcrc0 (c=4,5,6,7)
        // Wiersz 3: rrr00 (c=4,5,6)
        const birdGrid = [
            ['r','r','r','0','0'],
            ['r','c','r','c','0'],
            ['r','r','r','0','0']
        ];

        birdGrid.flat().forEach(color => {
            const d = document.createElement("div");
            d.className = "cell";
            if(color !== '0') d.classList.add("c-" + color);
            else d.style.background = "transparent";
            d.style.border = "none";
            overlay.appendChild(d);
        });

        // Pozycja startowa (r=1, c=4)
        const startX = 4 * 25;
        const startY = 1 * 25;
        overlay.style.left = startX + "px";
        overlay.style.top = startY + "px";

        // Ukrycie statycznych komórek na planszy
        for(let r=1; r<=3; r++) {
            for(let c=4; c<=8; c++) {
                const orig = document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
                if(orig) orig.style.visibility = "hidden";
            }
        }

        // Animacja
        const anim = overlay.animate([
            { transform: 'translateX(0px)' },
            { transform: 'translateX(-50px)', offset: 0.2 }, // 2 pola w lewo
            { transform: 'translateX(400px)', opacity: 0 }    // 16 pól w prawo od startu
        ], {
            duration: 2500,
            easing: "ease-in-out",
            fill: "forwards"
        });

        return anim.finished;
    }

    initNonogram();
</script>
</body>
</html>
