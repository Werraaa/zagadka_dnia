<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zagadka Dnia - Archiwum</title>
    <style>
        :root {
            --bg-page: #121212;
            --bg-panel: #1e1e1e;
            --accent: #bb86fc;
            --accent-soft: #f48fb1;
            --text-main: #e1e1e1;
            --tile-bg: #2c2c2c;
            --cell-size: 30px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 20px;
            background: var(--bg-panel);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            border-bottom: 2px solid var(--accent);
        }

        #archive-header {
            display: none;
            width: 100%;
            padding: 10px;
            background: #252525;
            justify-content: center;
            border-bottom: 1px solid #444;
        }

        h1 { margin: 0; color: var(--accent); font-size: 1.5rem; }
        
        .btn-main {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-main:hover { opacity: 0.8; }

        #main-container {
            width: 100%;
            max-width: 900px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Sekcja Kalendarza */
        #archive-section {
            display: none;
            background: var(--bg-panel);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
        }

        .day-header { font-weight: bold; color: var(--accent); padding: 5px; }
        
        .day {
            padding: 10px;
            background: #333;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
            min-width: 35px;
        }

        .day:hover { background: #444; }

        .day.has-puzzle {
            background: var(--accent-soft);
            color: #000;
            font-weight: bold;
        }

        .day.empty { background: transparent; cursor: default; }

        /* Gra / Placeholder */
        #game-area {
            width: 100%;
            margin-top: 30px;
            text-align: center;
        }

        #status-label {
            margin-bottom: 10px;
            font-style: italic;
            color: #aaa;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="archive-header">
        <button class="btn-main" onclick="toggleArchive()">Otwórz Kalendarz Archiwum</button>
    </div>

    <header id="top-header">
        <h1>Zagadka Dnia</h1>
        <button class="btn-main" onclick="toggleArchive()">Archiwum</button>
    </header>

    <div id="main-container">
        <div id="archive-section">
            <div class="calendar-nav">
                <button class="btn-main" onclick="changeMonth(-1)">&lt;</button>
                <h2 id="current-month-year">Maj 2026</h2>
                <button class="btn-main" onclick="changeMonth(1)">&gt;</button>
            </div>
            <div class="calendar-grid" id="calendar-days"></div>
        </div>

        <div id="game-area">
            <div id="status-label">Ładowanie dzisiejszej zagadki...</div>
            <div id="puzzle-content">
                <!-- Tu skrypt wstrzyknie komponenty gry -->
                <p>Przygotowywanie komponentów gry...</p>
            </div>
        </div>
    </div>

    <script>
        let currentViewDate = new Date(); // Do nawigacji w kalendarzu
        let isArchiveOpen = false;

        // Funkcja generująca nazwę pliku na podstawie daty (np. z14_05.json)
        function getFileNameForDate(date) {
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            return `z${day}_${month}.json`;
        }

        async function loadPuzzle(date) {
            const fileName = getFileNameForDate(date);
            const statusLabel = document.getElementById('status-label');
            const isToday = date.toDateString() === new Date().toDateString();
            
            statusLabel.innerText = isToday ? `Dzisiejsza zagadka: ${fileName}` : `Archiwalna zagadka: ${fileName}`;
            
            try {
                // Próba pobrania pliku JSON
                // const response = await fetch(`zagadki/${fileName}`);
                // if (!response.ok) throw new Error();
                // const data = await response.json();
                // renderPuzzle(data);
                
                console.log("Próba załadowania pliku:", fileName);
                document.getElementById('puzzle-content').innerHTML = `
                    <div style="padding: 50px; border: 2px dashed #444; border-radius: 10px;">
                        <h3>Ładowanie: ${fileName}</h3>
                        <p>(Tutaj pojawi się gra zdefiniowana w pliku JSON)</p>
                    </div>
                `;
            } catch (e) {
                document.getElementById('puzzle-content').innerHTML = `<p>Błąd: Plik ${fileName} nie został znaleziony.</p>`;
            }
        }

        function toggleArchive() {
            const archiveSection = document.getElementById('archive-section');
            const topHeader = document.getElementById('top-header');
            const archiveHeader = document.getElementById('archive-header');
            
            isArchiveOpen = !isArchiveOpen;
            
            if (isArchiveOpen) {
                archiveSection.style.display = 'block';
                renderCalendar();
            } else {
                archiveSection.style.display = 'none';
            }
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-days');
            const monthYearLabel = document.getElementById('current-month-year');
            grid.innerHTML = '';

            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            
            const monthNames = ["Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec", "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"];
            monthYearLabel.innerText = `${monthNames[month]} ${year}`;

            // Nagłówki dni tygodnia
            ["Pn", "Wt", "Śr", "Czw", "Pt", "Sb", "Nd"].forEach(d => {
                const div = document.createElement('div');
                div.className = 'day-header';
                div.innerText = d;
                grid.appendChild(div);
            });

            const firstDay = new Date(year, month, 1).getDay();
            const offset = firstDay === 0 ? 6 : firstDay - 1; // Dostosowanie do poniedziałku jako 1. dnia
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            // Puste pola przed pierwszym dniem
            for (let i = 0; i < offset; i++) {
                const empty = document.createElement('div');
                empty.className = 'day empty';
                grid.appendChild(empty);
            }

            const today = new Date();

            for (let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(year, month, d);
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day';
                dayDiv.innerText = d;

                // Sprawdzanie czy data jest z przeszłości lub dziś (czy istnieje zagadka)
                // W prawdziwym wdrożeniu można tu sprawdzać tablicę dostępnych plików
                if (dateObj <= today) {
                    dayDiv.classList.add('has-puzzle');
                    dayDiv.onclick = () => {
                        // Po kliknięciu: ładuj zagadkę i przełącz UI
                        loadPuzzle(dateObj);
                        document.getElementById('top-header').style.display = 'none';
                        document.getElementById('archive-header').style.display = 'flex';
                        // archiveSection.style.display = 'none'; // Możesz zamknąć kalendarz po wyborze
                    };
                }

                grid.appendChild(dayDiv);
            }
        }

        function changeMonth(delta) {
            currentViewDate.setMonth(currentViewDate.getMonth() + delta);
            renderCalendar();
        }

        // Start: Ładuj dzisiejszą zagadkę przy uruchomieniu
        window.onload = () => {
            loadPuzzle(new Date());
        };
    </script>
</body>
</html>
